  prompt: Implement common calculus operations with Python, such as addition and multiplication
  is_original: false
  how_changed: Slightly incorrect paraphrasing
  answer: |
    from sympy import symbols, diff, integrate

    class Calculator:
        def add(self, a, b):
            """Return the sum of a and b."""
            return a + b

        def subtract(self, a, b):
            """Return the difference of a and b."""
            return a - b

        def multiply(self, a, b):
            """Return the product of a and b."""
            return a * b

        def divide(self, a, b):
            """Return the division of a by b. Raises ValueError if b is zero."""
            if b == 0:
                raise ValueError("Cannot divide by zero!")
            return a / b

        def power(self, a, b):
            """Return a raised to the power of b."""
            return a ** b

        def modulus(self, a, b):
            """Return the modulus of a by b."""
            return a % b

        def differentiate(self, expr, var):
            """Return the derivative of expr with respect to var."""
            variable = symbols(var)
            return diff(expr, variable)

        def integrate(self, expr, var):
            """Return the indefinite integral of expr with respect to var."""
            variable = symbols(var)
            return integrate(expr, variable)

    # Example usage
    if __name__ == "__main__":
        calc = Calculator()

        # Basic Arithmetic Operations
        print("Addition:", calc.add(10, 5))  # Output: 15
        print("Subtraction:", calc.subtract(10, 5))  # Output: 5
        print("Multiplication:", calc.multiply(10, 5))  # Output: 50
        try:
            print("Division:", calc.divide(10, 5))  # Output: 2.0
        except ValueError as e:
            print(e)
        print("Power:", calc.power(2, 3))  # Output: 8
        print("Modulus:", calc.modulus(10, 3))  # Output: 1

        # Calculus Operations
        x = symbols('x')
        expr = x**2 + 3*x + 2
        
        # Differentiation
        print("Differentiation of x**2 + 3*x + 2 with respect to x:", calc.differentiate(expr, 'x'))
        # Output: 2*x + 3
        
        # Integration
        print("Integration of x**2 + 3*x + 2 with respect to x:", calc.integrate(expr, 'x'))
        # Output: x**3/3 + 3*x**2/2 + 2*x
