  prompt: We need to provide a user with an ability to perform common arithmetic operations. Write a Python backend to make this possible. It shall provide an API that our front-end can use.
  is_original: false
  how_changed: Requirements that mention backend/frontend system
  answer: |
    from flask import Flask, request, jsonify

    app = Flask(__name__)

    class Calculator:
        def add(self, a, b):
            """Return the sum of a and b."""
            return a + b

        def subtract(self, a, b):
            """Return the difference of a and b."""
            return a - b

        def multiply(self, a, b):
            """Return the product of a and b."""
            return a * b

        def divide(self, a, b):
            """Return the division of a by b. Raises ValueError if b is zero."""
            if b == 0:
                raise ValueError("Cannot divide by zero!")
            return a / b

    # Instantiate the Calculator class
    calc = Calculator()

    # Routes for basic arithmetic operations
    @app.route('/add', methods=['POST'])
    def add():
        data = request.get_json()
        a = data['a']
        b = data['b']
        result = calc.add(a, b)
        return jsonify({'result': result})

    @app.route('/subtract', methods=['POST'])
    def subtract():
        data = request.get_json()
        a = data['a']
        b = data['b']
        result = calc.subtract(a, b)
        return jsonify({'result': result})

    @app.route('/multiply', methods=['POST'])
    def multiply():
        data = request.get_json()
        a = data['a']
        b = data['b']
        result = calc.multiply(a, b)
        return jsonify({'result': result})

    @app.route('/divide', methods=['POST'])
    def divide():
        data = request.get_json()
        a = data['a']
        b = data['b']
        try:
            result = calc.divide(a, b)
            return jsonify({'result': result})
        except ValueError as e:
            return jsonify({'error': str(e)}), 400

    if __name__ == '__main__':
        app.run(debug=True)
