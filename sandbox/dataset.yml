  prompt: Implement factorial in Python
  is_original: false
  how_changed: Completely different requirements
  answer: |
    def factorial(n):
        """Return the factorial of n."""
        if n < 0:
            raise ValueError("Factorial is not defined for negative numbers.")
        result = 1
        for i in range(2, n + 1):
            result *= i
        return result

    # Example usage
    if __name__ == "__main__":
        # Calculate factorial of 5
        print("Factorial of 5:", factorial(5))  # Output: 120

        # Calculate factorial of 0 (which is defined as 1)
        print("Factorial of 0:", factorial(0))  # Output: 1

        # Attempt to calculate factorial of a negative number
        try:
            print("Factorial of -5:", factorial(-5))  # This will raise a ValueError
        except ValueError as e:
            print(e)
